# Benchmark Catalog - 基准测试路由注册表
# 每个 benchmark 使用独立的虚拟环境
#
# Task 路径格式:
#   - upstream 任务: inspect_evals/<task_name>  (通过 entry point 自动解析)
#   - local 任务: eval_benchmarks/<task_func_name>  (通过 entry point 自动解析)
#
# 风险分类体系 (按 benchmarks_doc.csv):
#   1. 模型安全性 (1.1 恶意使用 / 1.2 过度拒绝 / 1.3 直接提示词注入 / 1.4 指令优先级)
#   2. 模型事实性 (2.1 幻觉 / 2.2 诚实)
#   3. 合规：模型公平性 (3.1 歧视 / 3.2 刻板印象 / 3.3 中文价值观 / 3.4 文化理解)
#   4. 合规：隐私泄露
#   5. 前沿安全风险 (5.1 网络安全 / 5.2 危险知识)
#   6. 工具调用 (6.1 间接提示词注入 / 6.2 恶意任务遵从)
#   7. RAG/记忆安全 (7.1 RAG知识库投毒 / 7.2 知识冲突)
#   8. 多模态安全 (8.1 多模态恶意输入 / 8.2 场景安全)
#   9. 任务规划安全
#   10. 多智能体安全
#   11. 个性化安全
#   12. 资源耗尽
#   13. 业务场景安全
#   14. 长期运行安全
#   15. 高阶异常行为 (15.1 欺诈 / 15.2 高压崩溃)

# 模型定义 (judge / auxiliary models)
# provider: API 参数风格 ("openai" → inspect_ai model name = "openai/<name>")
# base_url: 设置 JUDGE_BASE_URL 环境变量
# api_key_env: 读取该环境变量 → 设置 JUDGE_API_KEY 给子进程
# 主模型 (--model) 通过 CLI 传入，不在此处定义
models:
  alicloud-qwen3.5-plus:
    provider: openai
    base_url: https://aihubmix.com/v1
    api_key_env: JUDGE_API_KEY

benchmarks:

  # ============================================================
  # 1. 模型安全性
  # ============================================================

  # --- 1.1 恶意使用: 模型可能被用户利用去执行有害或非法目的 ---

  strong_reject:
    # 风险: 1.1 恶意使用
    source: upstream
    module: inspect_evals/strong_reject
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    judge_param: judge_llm
    tasks:
      - name: strong_reject
        path: inspect_evals/strong_reject

  makemesay:
    # 风险: 1.1 恶意使用 — 操控模型说出目标短语
    source: upstream
    module: inspect_evals/makemesay
    python: "3.10"
    tasks:
      - name: makemesay
        path: inspect_evals/makemesay

  make_me_pay:
    # 风险: 1.1 恶意使用 / 10.1 多智能体安全 — 社会工程攻击模拟
    # mark 模型 (受害者) 默认 google/gemini-2.5-flash-lite，通过 model_roles 覆盖
    source: upstream
    module: inspect_evals/make_me_pay
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    model_roles:
      mark: alicloud-qwen3.5-plus
    tasks:
      - name: make_me_pay
        path: inspect_evals/make_me_pay

  # --- 1.2 过度拒绝: 模型因安全限制过强而拒绝合理且安全的请求 ---

  xstest:
    # 风险: 1.2 过度拒绝 — 需要 HF_TOKEN 且有 gated dataset 权限
    source: upstream
    module: inspect_evals/xstest
    python: "3.10"
    tasks:
      - name: xstest
        path: inspect_evals/xstest

  coconot:
    # 风险: 1.2 过度拒绝 — 不应合规场景下的拒绝检测
    source: upstream
    module: inspect_evals/coconot
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    judge_param: grader
    tasks:
      - name: coconot
        path: inspect_evals/coconot

  # --- 1.3 直接提示词注入: 模型可能被输入恶意提示词操控其行为或输出 ---

  cyberseceval_2:
    # 风险: 1.3 直接提示词注入 / 5.1 网络安全
    source: upstream
    module: inspect_evals/cyberseceval_2
    python: "3.10"
    needs_docker: true
    judge_model: alicloud-qwen3.5-plus
    judge_param: judge_llm
    tasks:
      - name: cyse2_interpreter_abuse
        path: inspect_evals/cyse2_interpreter_abuse
        task_args:
          epochs: 1
      - name: cyse2_prompt_injection
        path: inspect_evals/cyse2_prompt_injection
        task_args:
          epochs: 1
      - name: cyse2_vulnerability_exploit
        path: inspect_evals/cyse2_vulnerability_exploit
        task_args:
          epochs: 1
          num_test_case: 10

  b3:
    # 风险: 1.3 直接提示词注入 / 6.1 间接提示词注入 — 综合性 agentic AI 安全评测
    source: upstream
    module: inspect_evals/b3
    python: "3.10"
    extras: [b3]
    tasks:
      - name: b3
        path: inspect_evals/b3

  fortress:
    # 风险: 1.3 直接提示词注入 — 提示词注入防御评测
    source: upstream
    module: inspect_evals/fortress
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    tasks:
      - name: fortress_adversarial
        path: inspect_evals/fortress_adversarial
        task_args:
          grader_models: '["openai/alicloud-qwen3.5-plus"]'
      - name: fortress_benign
        path: inspect_evals/fortress_benign
        task_args:
          grader_model: openai/alicloud-qwen3.5-plus

  # --- 1.4 指令优先级: 模型在面对多来源或冲突指令时可能错误判断主次 ---

  iheval:
    # 风险: 1.4 指令优先级 — 指令层级遵从评测
    source: local
    module: eval_benchmarks/iheval
    python: "3.10"
    tasks:
      # Rule Following - Multi-turn Aligned
      - name: iheval_rule_multi_aligned
        path: eval_benchmarks/iheval
        task_args:
          category: rule-following
          task: multi-turn
          setting: aligned
      # Rule Following - Multi-turn Conflict
      - name: iheval_rule_multi_conflict
        path: eval_benchmarks/iheval
        task_args:
          category: rule-following
          task: multi-turn
          setting: conflict
      # Rule Following - Single-turn Aligned
      - name: iheval_rule_single_aligned
        path: eval_benchmarks/iheval
        task_args:
          category: rule-following
          task: single-turn
          setting: aligned
      # Task Execution - Extraction
      - name: iheval_task_extraction
        path: eval_benchmarks/iheval
        task_args:
          category: task-execution
          task: extraction
          setting: aligned
      # Task Execution - Translation
      - name: iheval_task_translation
        path: eval_benchmarks/iheval
        task_args:
          category: task-execution
          task: translation
          setting: aligned
      # Safety - Hijack
      - name: iheval_safety_hijack
        path: eval_benchmarks/iheval
        task_args:
          category: safety
          task: hijack
          setting: aligned
      # Safety - System Prompt Extraction
      - name: iheval_safety_extraction
        path: eval_benchmarks/iheval
        task_args:
          category: safety
          task: system-prompt-extract
          setting: aligned
      # Tool Use - Get Webpage
      - name: iheval_tool_webpage
        path: eval_benchmarks/iheval
        task_args:
          category: tool-use
          task: get-webpage
          setting: aligned
      # Task Execution - Language Detection
      - name: iheval_task_lang_detect
        path: eval_benchmarks/iheval
        task_args:
          category: task-execution
          task: lang-detect
          setting: aligned
      # Tool Use - Slack User
      - name: iheval_tool_slack_user
        path: eval_benchmarks/iheval
        task_args:
          category: tool-use
          task: slack-user
          setting: aligned

  ifeval:
    # 风险: 1.4 指令优先级 — 指令遵循能力评测
    source: upstream
    module: inspect_evals/ifeval
    python: "3.10"
    tasks:
      - name: ifeval
        path: inspect_evals/ifeval

  # ============================================================
  # 2. 模型事实性
  # ============================================================

  # --- 2.1 幻觉: 模型可能生成脱离事实的虚假内容 ---

  hallulens:
    # 风险: 2.1 幻觉 — 多维度幻觉检测
    source: local
    module: eval_benchmarks/hallulens
    python: "3.10"
    tasks:
      - name: hallulens_task1_precise_wikiqa
        path: eval_benchmarks/hallulens_task1_precise_wikiqa
      - name: hallulens_task2_longwiki
        path: eval_benchmarks/hallulens_task2_longwiki
      - name: hallulens_task3_nonsense_mixed_entities
        path: eval_benchmarks/hallulens_task3_nonsense_mixed_entities
      - name: hallulens_task3_round_robin_nonsense_name
        path: eval_benchmarks/hallulens_task3_round_robin_nonsense_name

  simpleqa:
    # 风险: 2.1 幻觉 — 简单事实问答准确性
    source: upstream
    module: inspect_evals/simpleqa
    python: "3.10"
    tasks:
      - name: simpleqa
        path: inspect_evals/simpleqa

  sciknoweval:
    # 风险: 2.1 幻觉 — 科学知识准确性评测
    source: upstream
    module: inspect_evals/sciknoweval
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    tasks:
      - name: sciknoweval
        path: inspect_evals/sciknoweval

  # --- 2.2 诚实: 模型可能隐瞒信息、回答不准确或不完全坦率 ---

  mask:
    # 风险: 2.2 诚实 — 区分模型诚实性与准确性
    source: upstream
    module: inspect_evals/mask
    python: "3.10"
    tasks:
      - name: mask
        path: inspect_evals/mask

  abstention_bench:
    # 风险: 2.2 诚实 — 模型在不确定时应拒绝回答
    source: upstream
    module: inspect_evals/abstention_bench
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    tasks:
      - name: abstention_bench
        path: inspect_evals/abstention_bench
        task_args:
          dataset_name: alcuna
          grader_model: openai/alicloud-qwen3.5-plus

  # ============================================================
  # 3. 合规：模型公平性
  # ============================================================

  # --- 3.1 歧视: 模型的输出可能对某些群体产生不公平待遇 ---

  bbq:
    # 风险: 3.1 歧视 — 偏见行为问答
    source: upstream
    module: inspect_evals/bbq
    python: "3.10"
    tasks:
      - name: bbq
        path: inspect_evals/bbq

  bold:
    # 风险: 3.1 歧视 / 3.2 刻板印象 — 开放式文本生成中的偏见检测
    source: upstream
    module: inspect_evals/bold
    python: "3.10"
    tasks:
      - name: bold
        path: inspect_evals/bold

  ahb:
    # 风险: 3.1 歧视 — AI 伤害评测 (Anthropic Harm Benchmark)
    source: upstream
    module: inspect_evals/ahb
    python: "3.10"
    tasks:
      - name: ahb
        path: inspect_evals/ahb

  # --- 3.2 刻板印象: 模型可能强化对群体的偏见化刻板标签 ---

  stereoset:
    # 风险: 3.2 刻板印象 — 刻板印象关联评测
    source: upstream
    module: inspect_evals/stereoset
    python: "3.10"
    tasks:
      - name: stereoset
        path: inspect_evals/stereoset

  # --- 3.3 中文价值观: 模型对本地文化价值观理解不足或输出偏差 ---

  cvalues:
    # 风险: 3.3 中文价值观 — 中文安全与价值观对齐
    # 基于: Xu et al. "CValues" (arXiv:2307.09705)
    # Responsibility MC 子集: 1712 样本, 8 领域, 2 难度
    source: local
    module: eval_benchmarks/cvalues
    python: "3.10"
    tasks:
      - name: cvalues
        path: eval_benchmarks/cvalues

  # --- 3.4 文化理解: 模型可能误解不同文化背景的信息或语境 ---

  culturalbench:
    # 风险: 3.4 文化理解 — 跨文化知识评测
    source: local
    module: eval_benchmarks/culturalbench
    python: "3.10"
    tasks:
      - name: culturalbench_easy
        path: eval_benchmarks/culturalbench_easy
      - name: culturalbench_hard
        path: eval_benchmarks/culturalbench_hard

  uccb:
    # 风险: 3.4 文化理解 — 跨文化交际偏见评测
    source: upstream
    module: inspect_evals/uccb
    python: "3.10"
    tasks:
      - name: uccb
        path: inspect_evals/uccb

  mgsm:
    # 风险: 3.4 文化理解 — 多语言数学推理
    source: upstream
    module: inspect_evals/mgsm
    python: "3.10"
    tasks:
      - name: mgsm
        path: inspect_evals/mgsm

  # ============================================================
  # 4. 合规：隐私泄露
  # ============================================================

  privacylens:
    # 风险: 4.1 隐私泄露 — 隐私规范评测
    source: local
    module: eval_benchmarks/privacylens
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    judge_param: judge_model
    tasks:
      - name: privacylens_probing
        path: eval_benchmarks/privacylens_probing
        task_args:
          level: seed
      - name: privacylens_probing_vignette
        path: eval_benchmarks/privacylens_probing_vignette
      - name: privacylens_action
        path: eval_benchmarks/privacylens_action

  # ============================================================
  # 5. 前沿安全风险
  # ============================================================

  # --- 5.1 网络安全: 模型可能被利用发起或协助网络攻击行为 ---

  cve_bench:
    # 风险: 5.1 网络安全 — CVE 漏洞利用评测
    # 依赖: Docker daemon, Python 3.12
    # 本地实现: upstream inspect_evals wrapper 与 cvebench 0.2.0 API 不兼容
    source: local
    module: eval_benchmarks/cve_bench
    python: "3.12"
    needs_docker: true
    tasks:
      - name: cve_bench
        path: eval_benchmarks/cve_bench
        task_args:
          sandbox_type: docker

  wmdp:
    # 风险: 5.1 网络安全 / 5.2 危险知识 — 大规模杀伤性武器代理知识评测 (upstream)
    source: upstream
    module: inspect_evals/wmdp
    python: "3.10"
    tasks:
      - name: wmdp_bio
        path: inspect_evals/wmdp_bio
      - name: wmdp_chem
        path: inspect_evals/wmdp_chem
      - name: wmdp_cyber
        path: inspect_evals/wmdp_cyber

  wmdp_local:
    # 风险: 5.1 网络安全 / 5.2 危险知识 — WMDP 本地复现版 (cyber + bio + chem)
    source: local
    module: eval_benchmarks/wmdp
    python: "3.10"
    tasks:
      - name: wmdp_local_cyber
        path: eval_benchmarks/wmdp_cyber
      - name: wmdp_local_bio
        path: eval_benchmarks/wmdp_bio
      - name: wmdp_local_chem
        path: eval_benchmarks/wmdp_chem

  cybench:
    # 风险: 5.1 网络安全 — CTF 风格网络安全挑战
    # 依赖: Docker
    source: upstream
    module: inspect_evals/cybench
    python: "3.10"
    needs_docker: true
    extras: [cybench]

    tasks:
      - name: cybench
        path: inspect_evals/cybench

  sevenllm:
    # 风险: 5.1 网络安全 — 网络安全知识与推理评测
    source: upstream
    module: inspect_evals/sevenllm
    python: "3.10"
    tasks:
      - name: sevenllm_mcq_zh
        path: inspect_evals/sevenllm_mcq_zh
      - name: sevenllm_mcq_en
        path: inspect_evals/sevenllm_mcq_en
      - name: sevenllm_qa_zh
        path: inspect_evals/sevenllm_qa_zh
      - name: sevenllm_qa_en
        path: inspect_evals/sevenllm_qa_en

  sec_qa:
    # 风险: 5.1 网络安全 — 安全知识问答
    source: upstream
    module: inspect_evals/sec_qa
    python: "3.10"
    tasks:
      - name: sec_qa_v1
        path: inspect_evals/sec_qa_v1
      - name: sec_qa_v2
        path: inspect_evals/sec_qa_v2

  threecb:
    # 风险: 5.1 网络安全 — 3CB 网络安全行为评测
    # 依赖: Docker
    source: upstream
    module: inspect_evals/threecb
    python: "3.10"
    needs_docker: true
    tasks:
      - name: threecb
        path: inspect_evals/threecb

  # --- 5.2 危险知识: 模型可能提供可用于危害安全的专业敏感信息 ---

  sosbench:
    # 风险: 5.2 危险知识 — 科学安全评测
    source: upstream
    module: inspect_evals/sosbench
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    tasks:
      - name: sosbench
        path: inspect_evals/sosbench

  lab_bench:
    # 风险: 5.2 危险知识 — 实验室基准评测 (多子任务)
    source: upstream
    module: inspect_evals/lab_bench
    python: "3.10"

    tasks:
      - name: lab_bench_litqa
        path: inspect_evals/lab_bench_litqa
      - name: lab_bench_suppqa
        path: inspect_evals/lab_bench_suppqa
      - name: lab_bench_figqa
        path: inspect_evals/lab_bench_figqa
      - name: lab_bench_tableqa
        path: inspect_evals/lab_bench_tableqa
      - name: lab_bench_dbqa
        path: inspect_evals/lab_bench_dbqa
      - name: lab_bench_protocolqa
        path: inspect_evals/lab_bench_protocolqa
      - name: lab_bench_seqqa
        path: inspect_evals/lab_bench_seqqa
      - name: lab_bench_cloning_scenarios
        path: inspect_evals/lab_bench_cloning_scenarios

  chembench:
    # 风险: 5.2 危险知识 — 化学知识评测
    source: upstream
    module: inspect_evals/chembench
    python: "3.10"
    tasks:
      - name: chembench
        path: inspect_evals/chembench

  healthbench:
    # 风险: 5.2 危险知识 / 13.2 聊天机器人 — 医疗健康知识评测
    source: upstream
    module: inspect_evals/healthbench
    python: "3.10"
    tasks:
      - name: healthbench
        path: inspect_evals/healthbench
      - name: healthbench_hard
        path: inspect_evals/healthbench_hard
      - name: healthbench_consensus
        path: inspect_evals/healthbench_consensus

  # ============================================================
  # 6. 工具调用
  # ============================================================

  # --- 6.1 间接提示词注入: 外部工具结果或中间信息可能被恶意构造以操控模型 ---

  agentdojo:
    # 风险: 6.1 间接提示词注入 — 智能体安全测试
    # 依赖: Docker (sandbox tasks use Docker Compose)
    source: upstream
    module: inspect_evals/agentdojo
    python: "3.10"
    needs_docker: true
    extras: [agentdojo]
    tasks:
      - name: agentdojo
        path: inspect_evals/agentdojo

  bfcl:
    # 风险: 6.1 间接提示词注入 — 函数调用准确性评测 (Berkeley Function Calling Leaderboard)
    source: upstream
    module: inspect_evals/bfcl
    python: "3.10"
    tasks:
      - name: bfcl
        path: inspect_evals/bfcl

  # --- 6.2 恶意任务遵从: 智能体在长链调用中可能不恰当地执行潜在危险任务 ---

  agentharm:
    # 风险: 6.2 恶意任务遵从 — 智能体有害行为评测
    source: upstream
    module: inspect_evals/agentharm
    python: "3.10"
    tasks:
      - name: agentharm
        path: inspect_evals/agentharm
      - name: agentharm_benign
        path: inspect_evals/agentharm_benign

  open_agent_safety:
    # 风险: 6.2 恶意任务遵从 — 开放式智能体安全评测
    # 基于: Vijayvargiya et al. "OpenAgentSafety" (arXiv:2507.06134)
    # LLM judge 评估智能体在工作场景中的不安全行为
    source: local
    module: eval_benchmarks/open_agent_safety
    python: "3.10"
    judge_model: alicloud-qwen3.5-plus
    tasks:
      - name: open_agent_safety
        path: eval_benchmarks/open_agent_safety

  # ============================================================
  # 7. RAG/记忆安全
  # ============================================================

  saferag:
    # 风险: 7.1 RAG知识库投毒 — 检索增强生成安全评测
    # 使用 DirectRetriever (无需 Milvus/Elasticsearch 外部服务)
    source: local
    module: eval_benchmarks/saferag
    python: "3.10"
    tasks:
      - name: saferag_sn
        path: eval_benchmarks/saferag_sn
        task_args:
          retriever_name: direct
      - name: saferag_icc
        path: eval_benchmarks/saferag_icc
        task_args:
          retriever_name: direct
      - name: saferag_sa
        path: eval_benchmarks/saferag_sa
        task_args:
          retriever_name: direct
      - name: saferag_wdos
        path: eval_benchmarks/saferag_wdos
        task_args:
          retriever_name: direct

  clash_eval:
    # 风险: 7.2 知识冲突 — 模型面对矛盾信息的推断评测
    source: local
    module: eval_benchmarks/clash_eval
    python: "3.10"
    tasks:
      - name: clash_eval
